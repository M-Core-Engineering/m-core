version: '3'
shell:
  windows: powershell
  unix: sh

tasks:

  # -----------------------------------------------------------------------------------------------------------
  autoload-engines:
    internal: false
    desc: "Find the package manager to use in OS detected "
    vars:
      DETECTED_ENGINE:
        sh: |
          {{if eq OS "windows"}}
            if (Get-Command scoop -ErrorAction SilentlyContinue) { "scoop" };
          {{else}}
          if [ -n "$TERMUX_VERSION" ]; then echo "termux";
            elif command -v brew >/dev/null 2>&1; then echo "brew";
            elif command -v apt-get >/dev/null 2>&1; then echo "apt";
            elif command -v dnf >/dev/null 2>&1; then echo "dnf";
            elif command -v pacman >/dev/null 2>&1; then echo "pacman";
            else echo "unsupported"; fi
          {{end}}
    cmds:
      # creation native des fichiers proxy
      - |
        {{if eq OS "windows"}}
        Copy-Item -Path "{{.PKG_DIR}}/{{DETECTED_ENGINE}}.yml" -Destination "{{.PKG_ENGINE_FILE}}"" -Force
        {{else}}
        cp -f "{{.PKG_DIR}}/{{DETECTED_ENGINE}}.yml" "{{.PKG_ENGINE_FILE}}""
    status:
      - test -f {{.PKG_ENGINE_FILE}}
    silent: true

