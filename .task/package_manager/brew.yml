version: '3'


tasks:
  # --- INTERFACES PUBLICS ---

  # -----------------------------------------------------------------------
  install:
    desc: "Installe un paquet (Usage: task pkg:install PKG=nom_du_paquet)"
    requires: { vars: [PKG] }
    cmds:
      - task: _log
        vars: { MSG: "[ALERTE] - Tentative d'installation de {{.PKG}} via {{.PKG_ENGINE}}." }
      - brew install {{.PKG}} --exact --silent
      - task: _log
        vars: { MSG: "[SUCCESS] - {{.PKG}} installé via {{.PKG_ENGINE}}." }
    status:
      - sh: brew list {{.PKG}} >/dev/null 2>&1
    on_error:
      - task: _log
        vars: { MSG: "[ECHEC] - Installation de {{.PKG}} via {{.PKG_ENGINE}} échouée." }


  # # -----------------------------------------------------------------------
  update:
    desc: "Met a jour un paquet (Usage: task pkg:update PKG=nom_du_paquet)"
    requires: { vars: [PKG] }
    cmds:
      - brew upgrade {{.PKG}}


  # # -----------------------------------------------------------------------
  remove:
    desc: "Supprime un paquet (Usage: task pkg:remove PKG=nom_du_paquet)"
    requires: { vars: [PKG] }
    cmds:
      - brew uninstall {{.PKG}} {{end}}