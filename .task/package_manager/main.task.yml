version: '3'

tasks:
  install:
    desc: "Abstraction universelle d'installation"
    cmds:
      - |
        {{if eq OS "windows"}}
          # Priorité à Scoop, fallback sur Winget si spécifié
          task pm-scoop:install PKG={{.PKG}}
        {{else if .TERMUX_VERSION}}
          task pm-termux:install PKG={{.PKG}}
        {{else if eq OS "darwin"}}
          task pm-brew:install PKG={{.PKG}}
        {{else}}
          task pm-apt:install PKG={{.PKG}}
        {{end}}
    requires:
      vars: [PKG]

  # Logique similaire pour update et remove...

  update:
    desc: "Met à jour un paquet"
    cmds:
      - |
        {{if eq OS "windows"}}
          task pm:scoop:update PKG={{.PKG}}
        {{else}}
          task pm:termux:update PKG={{.PKG}}
        {{end}}