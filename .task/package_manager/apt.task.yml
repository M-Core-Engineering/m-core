version: '3'

tasks:
  install:
    internal: true
    cmds:
      - |
        # Vérification si l'utilisateur est root (UID 0)
        if [ "$(id -u)" -ne 0 ]; then
          echo "⚠️ Erreur : APT nécessite des privilèges root. Veuillez relancer avec 'sudo task ...' ou passer en root."
          exit 1
        fi
      - apt-get update -qq
      - apt-get install -y {{.PKG}}
    status:
      - dpkg -s {{.PKG}} > /dev/null 2>&1

  update:
    internal: true
    cmds:
      - |
        if [ "$(id -u)" -ne 0 ]; then exit 1; fi
      - apt-get install --only-upgrade -y {{.PKG}}