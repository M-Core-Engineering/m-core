version: '3'

tasks:
  install:
    internal: true
    cmds:
      # --exact pour éviter les ambiguïtés de noms, --silent pour l'automatisation
      - winget install --id {{.PKG}} --exact --silent --accept-source-agreements --accept-package-agreements
    status:
      - winget list --id {{.PKG}} --exact > /dev/null 2>&1

  update:
    internal: true
    cmds:
      - winget upgrade --id {{.PKG}} --exact --silent

  remove:
    internal: true
    cmds:
      - winget uninstall --id {{.PKG}} --exact --silent