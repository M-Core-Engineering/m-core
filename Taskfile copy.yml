version: '3'
set: [pipefail]
shell:
  windows: powershell
  unix: sh

# ==================================================================================================
# Variables statiques
# ==================================================================================================
vars:
  PKG_DIR: "./.task/package_manager"
  MOD_DIR: "./.task/module"
  TEST_DIR: "./.task/test"
  PKG_ENGINE_FILE: "./.task/package_manager/pkg_current_engine.yml"
  TEST_ENGINE_FILE: "./.task/test/test_current_engine.yml"

# ==================================================================================================
# Inclusion des tâches des sous-modules
# ==================================================================================================
includes:
  # --- MODULE DE GESTION DE CYCLE DE VIE DE PACKAGE (ABSTRACTION LAYER)---
  pkg:
    taskfile: "{{.PKG_ENGINE_FILE}}"
    optional: true

  # --- MODULE DES TESTS (QUALITY & CI - ABSTRACTION LAYER REGISTER)
  test:
    taskfile: "{{.TEST_ENGINE_FILE}}"
    optional: true

  # --- MODULES D'ACTIVITE METIERS ---
  git:
    taskfile: "{{.MOD_DIR}}/git-task.yml"
    internal: true

  worker:
    taskfile: "{{.MOD_DIR}}/worker-task.yml"
    internal: false

# ==================================================================================================
# Definition des commandes
# ==================================================================================================
tasks:
  # -------------------------------------------------------------------------------
  default:
    cmds:
      - task --list

  # -------------------------------------------------------------------------------
  init:
    desc: "Initialise l'environnement de developpement (Detection OS & Modules)"
    cmds:
      - task worker:autoload-engines
      - echo "Environnement pret (Moteur detecter -> {{.PKG_ENGINE}})"
    silent: true

