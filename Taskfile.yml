version: '3'

# Definition des variables
vars:
  BIN_DIR: bin
  DIST_DIR: dist
  LOG_FILE: "{{.ROOT_DIR}}/task.log"
  PKG_ENGINE:
    sh: |
      if [ "${OS:-}" = "Windows_NT" ]; then
        if command -v scoop >/dev/null 2>&1; then
          echo "scoop"
        elif command -v winget >/dev/null 2>&1; then
          echo "winget"
        else
          echo "unsupported"
        fi
      elif [ -n "$TERMUX_VERSION" ]; then
        echo "termux"
      elif command -v brew >/dev/null 2>&1 && [ -d "/opt/homebrew" ] || [ -d "/usr/local/bin/brew" ]; then
        echo "brew"
      elif command -v apt-get >/dev/null 2>&1 && [ -f /etc/debian_version ]; then
        echo "apt"
      elif command -v dnf >/dev/null 2>&1; then
        echo "dnf"
      elif command -v pacman >/dev/null 2>&1; then
        echo "pacman"
      else
        echo "unsupported"
      fi


# Inclusion des tâches des sous-modules
includes:
  pkg:
    taskfile: ./.task/package_manager/{{.PKG_ENGINE}}.yml
    optional: false
    # vars:
    #   DEBUG: "{{.DEBUG}}"

  # engine: ./engine/Taskfile.yml
  # spec: ./spec/Taskfile.yml
  # mobile: ./mobile/Taskfile.yml


# Definition des commandes
tasks:
  # -------------------------------------------------------------------------------
  default:
    cmds:
      - task --list

  # -------------------------------------------------------------------------------
  setup:
    desc: "Initialise l'environnement complet (Submodules + Dépendances)"
    cmds:
      - git submodule update --init --recursive
      # - task: setup:tools
      - echo "Système M-CORE prêt."

  # -------------------------------------------------------------------------------
  _check-pkg:
    cmds:
      - |
        if [ "{{.PKG_ENGINE}}" = "unsupported" ]; then
          echo "❌ Le gestionnaire d'installation '{{.PKG_ENGINE}}' n'est pas supporté par notre écosystème." >&2
          exit 1
        fi

  _log:
    internal: true
    vars:
      TIMESTAMP: { sh: "date '+%Y-%m-%d %H:%M:%S'" }
    cmds:
      - |
        {{if eq OS "windows"}}
        powershell -Command "Add-Content -Path {{.LOG_FILE}} -Value '{{TIMESTAMP}} [INFO] {{.MSG}}'"
        {{else}}
        echo "{{.TIMESTAMP}} [INFO] {{.MSG}}" >> {{.LOG_FILE}}
        {{end}}
      - echo "{{.MSG}}"





